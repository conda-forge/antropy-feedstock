{% set name = "antropy" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 869f0e935b798f698d18e5d97fc854fca0fd37b79c231dc7cf4494b5e843826b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - scikit-learn
    - numba

test:
  imports:
    - antropy
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check

about:
  home: https://raphaelvallat.com/antropy/build/html/index.html
  summary: Entropy and complexity of (EEG) time-series data in Python
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  dev_url: https://github.com/raphaelvallat/antropy

extra:
  recipe-maintainers:
    - raphaelvallat
    - larsoner
    - hoechenberger
